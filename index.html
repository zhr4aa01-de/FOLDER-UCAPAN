<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- ✅ WAJIB -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idul Fitri ✨</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0d1b2a, #000);
  color: white;
  overflow-x: hidden; /* FIX */
}

/* 🌙 Bulan (responsive) */
.moon {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #ffd700;
  border-radius: 50%;
  box-shadow: 0 0 30px #ffd700;
}

.moon::after {
  content: '';
  position: absolute;
  top: 8px;
  left: 15px;
  width: 60px;
  height: 60px;
  background: #0d1b2a;
  border-radius: 50%;
}

/* 🌟 Bintang */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  50% {opacity: 0.2;}
}

/* 💌 Card */
.card {
  position: relative;
  margin: 100px auto;
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  text-align: center;
  width: 90%;
  max-width: 400px;
}

/* ✨ Title */
h1 {
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700;
  font-size: 22px;
}

/* ⌨️ Typing */
.typing {
  font-size: 14px;
  line-height: 1.6;
  margin-top: 10px;
  white-space: pre-line;
}

/* 🧾 Nama */
.name {
  margin-top: 15px;
  font-weight: bold;
  color: #ffd700;
}

/* 🔘 Button */
.btn {
  margin-top: 20px;
  padding: 12px;
  width: 100%; /* FIX biar enak di HP */
  border: none;
  border-radius: 20px;
  background: #ffd700;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* 💫 Confetti */
.confetti {
  position: fixed; /* FIX biar ga aneh */
  top: 0;
  width: 8px;
  height: 8px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}

/* 📱 KHUSUS HP */
@media (max-width: 480px) {
  .card {
    margin: 80px auto;
    padding: 20px;
  }

  h1 {
    font-size: 18px;
  }

  .typing {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="card">
  <h1>🌙 Minal Aidzin Wal Faizin ✨</h1>
  <div class="typing" id="text"></div>

  <div class="name">— AzZahra Mauliya Needa —</div>

  <button class="btn" onclick="celebrate()">Klik Ucapan 💌</button>
</div>

<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
/* 🌟 Bintang FIX biar responsive */
for (let i = 0; i < 80; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 100 + "vh";
  star.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(star);
}

/* ⌨️ Typing */
const message = `Mohon maaf lahir dan batin

Dalam beningnya hati setelah sebulan menempa diri,
izinkan saya mengucapkan maaf atas segala kata yang pernah terucap,
sikap yang mungkin tidak berkenan,
dan segala khilaf yang tanpa sadar terselip.

Semoga di hari yang suci ini,
kita kembali menjadi pribadi yang lebih bersih,
lebih sabar, dan penuh keikhlasan 🤍`;

let i = 0;
function typing() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing, 25);
  }
}
typing();

/* 💫 Confetti FIX */
function celebrate() {
  alert("Selamat Idul Fitri 🌙✨");

  for (let i = 0; i < 40; i++) {
    let confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(confetti);

    setTimeout(() => confetti.remove(), 3000);
  }
}
</script>

</body>
</html>
